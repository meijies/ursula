apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ursula.fullname" . }}
  labels:
    {{- include "ursula.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "ursula.fullname" . }}-peer
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "ursula.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "ursula.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 120
      initContainers:
        - name: init-config
          image: busybox:1.36
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 32Mi
          command:
            - sh
            - /scripts/init-config.sh
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: config
              mountPath: /etc/ursula
      containers:
        - name: ursula
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - ursula
          args:
            - --listen
            - {{ .Values.ursula.listen | quote }}
            - --core-count
            - {{ .Values.ursula.coreCount | quote }}
            - --raft-group-count
            - {{ .Values.ursula.raftGroupCount | quote }}
            - --raft-log-dir
            - {{ .Values.ursula.raftLogDir | quote }}
            - --raft-cluster-config
            - /etc/ursula/cluster.json
          ports:
            - name: raft
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /__ursula/metrics
              port: {{ .Values.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /__ursula/metrics
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /__ursula/metrics
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          env:
            - name: URSULA_COLD_BACKEND
              value: {{ .Values.coldStorage.backend | quote }}
            {{- if eq .Values.coldStorage.backend "s3" }}
            - name: URSULA_COLD_S3_BUCKET
              value: {{ .Values.coldStorage.s3.bucket | quote }}
            - name: URSULA_COLD_S3_REGION
              value: {{ .Values.coldStorage.s3.region | quote }}
            - name: URSULA_COLD_ROOT
              value: {{ .Values.coldStorage.s3.root | quote }}
            {{- if .Values.coldStorage.s3.endpoint }}
            - name: URSULA_COLD_S3_ENDPOINT
              value: {{ .Values.coldStorage.s3.endpoint | quote }}
            {{- end }}
            {{- if .Values.coldStorage.s3.secretAccessKey }}
            - name: URSULA_COLD_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "ursula.fullname" . }}-s3
                  key: URSULA_COLD_S3_ACCESS_KEY_ID
            - name: URSULA_COLD_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ursula.fullname" . }}-s3
                  key: URSULA_COLD_S3_SECRET_ACCESS_KEY
            {{- end }}
            {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/ursula
            - name: raft-log
              mountPath: {{ .Values.ursula.raftLogDir }}
      volumes:
        - name: scripts
          configMap:
            name: {{ include "ursula.fullname" . }}-scripts
            defaultMode: 0755
        - name: config
          emptyDir: {}
{{- if not .Values.persistence.enabled }}
        - name: raft-log
          emptyDir: {}
{{- end }}
{{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: raft-log
        labels:
          {{- include "ursula.labels" . | nindent 10 }}
        {{- if or .Values.persistence.retain .Values.persistence.annotations }}
        annotations:
          {{- if .Values.persistence.retain }}
          helm.sh/resource-policy: keep
          {{- end }}
          {{- with .Values.persistence.annotations }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- end }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
{{- end }}
